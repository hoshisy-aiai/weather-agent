name: Daily Weather Update

on:
  schedule:
    # GitHubの混雑による遅延（1〜2時間）を見越して、早めに予約！
    # 日本時間 13:00（世界標準時 04:00）に起動するように設定しています
    - cron: '0 4 * * *'
  workflow_dispatch: # 手動実行ボタンも有効

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Create credentials.json
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > src/main/resources/credentials.json

      # 【重要】ここが「使えるモデル」をログに吐き出す新ステップです
      - name: Check Available Gemini Models
        run: |
          echo "--- 利用可能なGeminiモデル一覧を取得します ---"
          curl -s https://generativelanguage.googleapis.com/v1/models?key=${{ secrets.GEMINI_API_KEY }} | grep '"name":'
          echo "--------------------------------------------"

      - name: Run Application
        run: mvn spring-boot:run 
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
